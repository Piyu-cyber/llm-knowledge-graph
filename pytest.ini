[pytest]
markers =
    phase0: Phase 0 baseline ingestion and harness tests
    phase1: Phase 1 authentication and schema tests
    phase1_acceptance: Phase 1 infrastructure acceptance gate tests
    phase2: Phase 2 graph hierarchy and relationship tests
    phase2_acceptance: Phase 2 ingestion and CRAG acceptance gate tests
    phase3: Phase 3 RBAC and query-time access tests
    phase3_acceptance: Phase 3 personalization and IRT acceptance gate tests
    phase4: Phase 4 agent orchestration and routing tests
    phase4_acceptance: Phase 4 memory architecture and agent core acceptance tests
    phase5: Phase 5 cognitive/memory logic tests
    phase5_acceptance: Phase 5 dual dashboard MVP acceptance gate tests
    phase6: Phase 6 integration contract and API-shape tests
    phase6_acceptance: Phase 6 distributed inference and hardening acceptance tests
    phase7: Phase 7 unified dashboard and service extension tests
filterwarnings =
    ignore:builtin type SwigPyPacked has no __module__ attribute:DeprecationWarning
    ignore:builtin type SwigPyObject has no __module__ attribute:DeprecationWarning
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
