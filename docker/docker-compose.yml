version: '3.8'

services:
  # OmniProf Backend - RustWorkX graph backend
  # NO Neo4j needed! Data persists locally as JSON
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: omniprof_backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GRAPH_DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
